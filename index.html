<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rogue Poker PvE</title>
    <style>
      :root {
        --bg-felt: #0f6a45;
        --panel: #20322a;
        --pixel-border: #d7ffd8;
        --text: #f7fff8;
        --accent: #ffd166;
        --danger: #ff6b6b;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        color: var(--text);
        background:
          radial-gradient(circle at 20% 10%, #1d8f62 0%, transparent 30%),
          radial-gradient(circle at 80% 90%, #14603f 0%, transparent 30%),
          linear-gradient(180deg, #0c472f, #093322);
        font-family: "Courier New", monospace;
        image-rendering: pixelated;
        min-height: 100vh;
        overflow: hidden;
      }
      .screen { display: none; height: 100vh; }
      .screen.active { display: block; }
      .centered { display: grid; place-items: center; }
      .panel {
        background: #1b2d24cc;
        text-align: center;
        border: 3px solid var(--pixel-border);
        box-shadow: 0 0 0 3px #13331f inset;
        padding: 20px;
      }
      button {
        background: #2e503f;
        color: var(--text);
        border: 2px solid var(--pixel-border);
        padding: 8px 14px;
        margin: 6px;
        font-family: inherit;
        cursor: pointer;
      }
      .hud { position: fixed; right: 10px; top: 10px; background: #0009; padding: 10px; border: 2px solid var(--pixel-border); }
      .artifact-bar { position: fixed; left: 10px; bottom: 10px; width: 280px; min-height: 90px; background: #0009; border: 2px solid var(--pixel-border); padding: 8px; }
      .battle-center {
        position: fixed;
        inset: 80px 80px 180px 80px;
        display: grid;
        grid-template-rows: 1fr 1fr;
        gap: 18px;
      }
      .played-zone { background: #0006; border: 2px dashed #d7ffd877; padding: 8px; }
      .cards-row { display: flex; gap: 6px; flex-wrap: wrap; }
      .hand-area {
        position: fixed;
        left: 50%;
        bottom: -40px;
        transform: translateX(-50%);
        width: 90vw;
        height: 220px;
        pointer-events: auto;
      }
      .hand { position: relative; width: 100%; height: 100%; }
      .card {
        position: absolute;
        width: 90px;
        height: 130px;
        background: #f8f8f8;
        color: #111;
        border: 2px solid #222;
        border-radius: 8px;
        padding: 6px;
        transition: transform .12s ease, bottom .12s ease;
        cursor: pointer;
        user-select: none;
      }
      .card.selected { outline: 3px solid #ffdb78; bottom: 70px !important; }
      .card.enchanted { box-shadow: 0 0 0 3px #66d9ff inset; }
      .card .small { font-size: 12px; }
      .tooltip {
        position: fixed;
        background: #111;
        color: #fff;
        border: 1px solid #fff;
        font-size: 12px;
        padding: 6px;
        pointer-events: none;
        z-index: 99;
      }
      .shop-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; max-height: 42vh; overflow: auto; }
      .shop-item { border: 1px solid #fff8; padding: 8px; background: #0006; }
      h1,h2,h3,p { margin: 6px 0; }
    </style>
  </head>
  <body>
    <div id="titleScreen" class="screen centered active">
      <div class="panel">
        <h1>ROGUE POKER</h1>
        <p>ローグライク × ポーカー PvE</p>
        <p id="titleMessage" style="min-height:1.2em;color:#ffd166;"></p>
        <button id="startBtn">ゲーム開始</button>
      </div>
    </div>

    <div id="battleScreen" class="screen">
      <div class="hud" id="hud"></div>
      <div class="artifact-bar">
        <h3>アーティファクト</h3>
        <div id="artifacts"></div>
      </div>
      <div class="battle-center">
        <div class="played-zone"><h3>敵</h3><div id="enemyPlayed" class="cards-row"></div><div id="enemyInfo"></div></div>
        <div class="played-zone"><h3>自分</h3><div id="playerPlayed" class="cards-row"></div><div id="playerInfo"></div></div>
      </div>
      <div class="hand-area" id="handArea"><div id="hand" class="hand"></div></div>
      <div style="position:fixed;left:50%;bottom:175px;transform:translateX(-50%);"><button id="playTurnBtn">5枚で勝負</button></div>
      <div id="handTable" style="position:fixed;right:10px;top:140px;width:220px;background:#0009;border:2px solid var(--pixel-border);padding:8px;"></div>
    </div>

    <div id="upgradeScreen" class="screen centered">
      <div class="panel" style="width:min(95vw,1100px);">
        <h2>デッキ強化</h2>
        <div id="upgradeHud"></div>
        <button id="rerollBtn">リロール(5)</button>
        <div class="shop-grid" id="shopGrid"></div>
        <button id="nextBattleBtn">次の戦闘へ</button>
      </div>
    </div>

    <div id="tooltip" class="tooltip" style="display:none"></div>
    <script type="module" src="main.js"></script>
  </body>
</html>
